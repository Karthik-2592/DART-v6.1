<div style="position: relative; width: 100%; height: 600px; background: linear-gradient(135deg, var(--color-background-primary) 0%, var(--color-background-secondary) 100%); overflow: hidden; border-radius: var(--border-radius-lg);">
  <svg style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; filter: blur(60px);" preserveAspectRatio="none" viewBox="0 0 1000 600">
    <defs>
      <style>
        @keyframes float1 { 0% { transform: translateY(0px) translateX(0px); } 50% { transform: translateY(-40px) translateX(20px); } 100% { transform: translateY(0px) translateX(0px); } }
        @keyframes float2 { 0% { transform: translateY(0px) translateX(0px); } 50% { transform: translateY(-50px) translateX(-25px); } 100% { transform: translateY(0px) translateX(0px); } }
        @keyframes float3 { 0% { transform: translateY(0px) translateX(0px); } 50% { transform: translateY(-35px) translateX(30px); } 100% { transform: translateY(0px) translateX(0px); } }
        .blob1 { animation: float1 9s ease-in-out infinite; opacity: 0.08; }
        .blob2 { animation: float2 12s ease-in-out infinite; opacity: 0.07; }
        .blob3 { animation: float3 14s ease-in-out infinite; opacity: 0.06; }
      </style>
    </defs>
    <circle cx="120" cy="480" r="140" fill="var(--color-text-primary)" class="blob1"/>
    <circle cx="880" cy="80" r="180" fill="var(--color-text-primary)" class="blob2"/>
    <circle cx="650" cy="300" r="160" fill="var(--color-text-primary)" class="blob3"/>
    <circle cx="250" cy="120" r="120" fill="var(--color-text-primary)" class="blob1" style="animation-delay: 2s;"/>
    <circle cx="950" cy="520" r="100" fill="var(--color-text-primary)" class="blob2" style="animation-delay: 3s;"/>
    <circle cx="80" cy="300" r="130" fill="var(--color-text-primary)" class="blob3" style="animation-delay: 4s;"/>
    <circle cx="520" cy="580" r="110" fill="var(--color-text-primary)" class="blob1" style="animation-delay: 1s;"/>
  </svg>
  <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--color-text-secondary); text-align: center; pointer-events: none;">
    <div>
      <p style="margin: 0; font-weight: 500;">Your content here</p>
      <p style="margin: 8px 0 0 0; font-size: 14px;">Soft amorphous blobs float gently</p>
    </div>
  </div>
</div>
